get:
  tags:
    - Rate
  summary: List rate limit policies
  description: "Returns all configured rate limit policies."
  operationId: listRatePolicies
  security:
    - main_auth:
        - 'manage:rate'
    - service_token: []
  responses:
    '200':
      description: "List of rate policies."
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../components/schemas/RatePolicy.yaml'
    '401':
      $ref: ../components/responses/Problem.yaml
    '403':
      $ref: ../components/responses/Problem.yaml
post:
  tags:
    - Rate
  summary: Create a rate limit policy
  description: "Creates a new rate limit policy for a resource. Requires `manage:rate` scope."
  operationId: createRatePolicy
  security:
    - main_auth:
        - 'manage:rate'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/RatePolicy.yaml'
  responses:
    '201':
      description: "Rate policy created."
      content:
        application/json:
          schema:
            $ref: '../components/schemas/RatePolicy.yaml'
    '400':
      $ref: ../components/responses/Problem.yaml
    '401':
      $ref: ../components/responses/Problem.yaml
    '403':
      $ref: ../components/responses/Problem.yaml
    '409':
      description: "A policy for this resource already exists."
      $ref: ../components/responses/Problem.yaml
