parameters:
  - name: ruleId
    in: path
    required: true
    description: "Unique rule identifier."
    schema:
      type: string
    example: "rule-auth-001"
get:
  tags:
    - Rules
  summary: Get a rule
  operationId: getRule
  security:
    - main_auth:
        - 'manage:rules'
    - service_token: []
  responses:
    '200':
      description: "Rule details."
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Rule.yaml'
    '401':
      $ref: ../components/responses/Problem.yaml
    '403':
      $ref: ../components/responses/Problem.yaml
    '404':
      $ref: ../components/responses/Problem.yaml
put:
  tags:
    - Rules
  summary: Update a rule
  operationId: updateRule
  security:
    - main_auth:
        - 'manage:rules'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/Rule.yaml'
  responses:
    '200':
      description: "Rule updated."
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Rule.yaml'
    '400':
      $ref: ../components/responses/Problem.yaml
    '401':
      $ref: ../components/responses/Problem.yaml
    '403':
      $ref: ../components/responses/Problem.yaml
    '404':
      $ref: ../components/responses/Problem.yaml
delete:
  tags:
    - Rules
  summary: Delete a rule
  operationId: deleteRule
  security:
    - main_auth:
        - 'manage:rules'
  responses:
    '204':
      description: "Rule deleted."
    '401':
      $ref: ../components/responses/Problem.yaml
    '403':
      $ref: ../components/responses/Problem.yaml
    '404':
      $ref: ../components/responses/Problem.yaml
