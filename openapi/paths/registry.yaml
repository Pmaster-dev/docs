get:
  tags:
    - Registry
  summary: List registry packages
  description: |
    Lists all packages in the internal registry.

    **Internal only** — requires `read:registry` scope. This endpoint is not
    reachable from the public API gateway.
  operationId: listRegistryPackages
  security:
    - service_token: []
    - main_auth:
        - 'read:registry'
  parameters:
    - name: type
      in: query
      description: "Filter by package type."
      schema:
        type: string
        enum:
          - npm
          - docker
          - helm
    - name: q
      in: query
      description: "Search packages by name."
      schema:
        type: string
        example: "@magicians/"
  responses:
    '200':
      description: "List of registry packages."
      headers:
        X-Rate-Limit-Limit:
          $ref: ../components/headers/Rate-Limit-Limit.yaml
        X-Rate-Limit-Remaining:
          $ref: ../components/headers/Rate-Limit-Remaining.yaml
        X-Rate-Limit-Reset:
          $ref: ../components/headers/Rate-Limit-Reset.yaml
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../components/schemas/RegistryPackage.yaml'
    '401':
      $ref: ../components/responses/Problem.yaml
    '403':
      $ref: ../components/responses/Problem.yaml
post:
  tags:
    - Registry
  summary: Publish a package
  description: |
    Publishes a new package version to the internal registry.

    **Internal only** — requires `write:registry` scope.
  operationId: publishRegistryPackage
  security:
    - service_token: []
    - main_auth:
        - 'write:registry'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/RegistryPackage.yaml'
  responses:
    '201':
      description: "Package published successfully."
      content:
        application/json:
          schema:
            $ref: '../components/schemas/RegistryPackage.yaml'
    '400':
      $ref: ../components/responses/Problem.yaml
    '401':
      $ref: ../components/responses/Problem.yaml
    '403':
      $ref: ../components/responses/Problem.yaml
    '409':
      description: "Package version already exists."
      $ref: ../components/responses/Problem.yaml
