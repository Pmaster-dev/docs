get:
  tags:
    - Ingress
  summary: List ingress routes
  description: "Returns all configured ingress routes in priority order."
  operationId: listIngressRoutes
  security:
    - main_auth:
        - 'manage:ingress'
    - service_token: []
  responses:
    '200':
      description: "List of ingress routes."
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../components/schemas/IngressRoute.yaml'
    '401':
      $ref: ../components/responses/Problem.yaml
    '403':
      $ref: ../components/responses/Problem.yaml
post:
  tags:
    - Ingress
  summary: Create an ingress route
  description: |
    Adds a new route to the ingress table. Changes propagate to the cluster
    ingress controller within ~30 seconds.

    Requires `manage:ingress` scope.
  operationId: createIngressRoute
  security:
    - main_auth:
        - 'manage:ingress'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/IngressRoute.yaml'
  responses:
    '201':
      description: "Ingress route created."
      content:
        application/json:
          schema:
            $ref: '../components/schemas/IngressRoute.yaml'
    '400':
      $ref: ../components/responses/Problem.yaml
    '401':
      $ref: ../components/responses/Problem.yaml
    '403':
      $ref: ../components/responses/Problem.yaml
    '409':
      description: "A route with this host+path already exists."
      $ref: ../components/responses/Problem.yaml
