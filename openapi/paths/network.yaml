get:
  tags:
    - Network
  summary: List network nodes
  description: "Returns all nodes registered in the internal network topology."
  operationId: listNetworkNodes
  security:
    - service_token: []
    - main_auth:
        - 'read:users'
  responses:
    '200':
      description: "List of network nodes."
      headers:
        X-Rate-Limit-Limit:
          $ref: ../components/headers/Rate-Limit-Limit.yaml
        X-Rate-Limit-Remaining:
          $ref: ../components/headers/Rate-Limit-Remaining.yaml
        X-Rate-Limit-Reset:
          $ref: ../components/headers/Rate-Limit-Reset.yaml
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../components/schemas/NetworkNode.yaml'
    '401':
      $ref: ../components/responses/Problem.yaml
    '403':
      $ref: ../components/responses/Problem.yaml
