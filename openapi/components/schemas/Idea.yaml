type: object
description: A generated project idea.
required:
  - idea_id
  - title
  - prompt
properties:
  idea_id:
    type: string
    description: Unique identifier for this idea.
    example: idea-abc123
  title:
    type: string
    description: Short title for the idea.
    example: Deaf-First SaaS Platform
  prompt:
    type: string
    description: Original prompt submitted by the user.
    example: "Deaf-first SaaS idea for community governance"
  description:
    type: string
    description: Expanded description generated by IdeaMagician.
  target_audience:
    type: string
    description: Primary audience for the idea.
    example: Deaf entrepreneurs
  tags:
    type: array
    items:
      type: string
    example: ["accessibility", "governance", "web3"]
  created_at:
    type: string
    format: date-time
